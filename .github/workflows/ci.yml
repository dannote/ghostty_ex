name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, otp: '27', elixir: '1.18' }
          - { os: macos-latest, otp: '27', elixir: '1.18' }
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Build libghostty-vt
        run: |
          git clone --depth 1 https://github.com/ghostty-org/ghostty.git /tmp/ghostty-src
          cd /tmp/ghostty-src
          zig build -Demit-lib-vt -Doptimize=ReleaseFast

      - name: Install libghostty-vt
        run: |
          mkdir -p priv/lib priv/include
          cp /tmp/ghostty-src/zig-out/lib/libghostty-vt.* priv/lib/ 2>/dev/null || true
          cp -R /tmp/ghostty-src/zig-out/include/ghostty priv/include/

          for env in dev test; do
            dest=_build/$env/lib/ghostty/priv
            mkdir -p $dest/lib $dest/include
            cp -R priv/lib/* $dest/lib/
            cp -R priv/include/* $dest/include/
            for f in $dest/lib/libghostty-vt*.dylib; do
              [ -f "$f" ] && install_name_tool -id "$(cd $dest/lib && pwd)/libghostty-vt.dylib" "$f" 2>/dev/null || true
            done
          done

      - run: mix deps.get
      - run: GHOSTTY_BUILD=1 mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix ex_dna
      - run: GHOSTTY_BUILD=1 mix test

  example-live-terminal:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install example assets deps
        working-directory: examples/live_terminal/assets
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: examples/live_terminal/assets
        run: bunx playwright install --with-deps chromium

      - name: Install example app deps
        working-directory: examples/live_terminal
        run: mix deps.get

      - name: Install Tailwind and esbuild
        working-directory: examples/live_terminal
        run: mix setup

      - name: Build example assets
        working-directory: examples/live_terminal
        run: mix assets.build

      - name: Run browser feature test
        working-directory: examples/live_terminal
        run: mix test test/features/terminal_test.exs
