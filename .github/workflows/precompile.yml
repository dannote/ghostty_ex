name: Build precompiled NIFs

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-gnu,   os: ubuntu-latest }
          - { target: aarch64-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-macos-none, os: macos-latest }

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Build libghostty-vt
        run: |
          git clone --depth 1 https://github.com/ghostty-org/ghostty.git /tmp/ghostty-src
          cd /tmp/ghostty-src
          git checkout baad0aa6669dc576872831752be0f30debecbfd1 || true
          zig build -Demit-lib-vt -Doptimize=ReleaseFast

          mkdir -p $GITHUB_WORKSPACE/priv/lib $GITHUB_WORKSPACE/priv/include
          cp -R zig-out/include/ghostty $GITHUB_WORKSPACE/priv/include/
          cp zig-out/lib/libghostty-vt.* $GITHUB_WORKSPACE/priv/lib/ 2>/dev/null || true

          # Ensure we have at least the dylib or so
          ls -la $GITHUB_WORKSPACE/priv/lib/

      - name: Build NIF
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          GHOSTTY_BUILD=1 mix compile

      - name: Package artifact
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BASENAME="Elixir.Ghostty.Terminal.Nif"

          LIB_FILE=$(find priv/lib -name "*${BASENAME}.*" \
            \( -name "*.so" -o -name "*.dylib" \) \
            -not -name "*.[0-9]*" | sort | head -1)

          if [ -z "$LIB_FILE" ]; then
            echo "ERROR: Could not find built NIF library"
            find priv/lib -type f | head -20
            exit 1
          fi

          echo "Found NIF: ${LIB_FILE}"

          # Also include libghostty-vt alongside the NIF
          GHOSTTY_LIB=$(find priv/lib -name "libghostty-vt.*" \
            \( -name "*.so" -o -name "*.dylib" \) \
            -not -name "*.[0-9]*" | sort | head -1)

          echo "Found libghostty-vt: ${GHOSTTY_LIB}"

          mkdir -p artifacts
          ARTIFACT_NAME="${BASENAME}-v${VERSION}-${{ matrix.target }}.so.tar.gz"

          tar czf "artifacts/${ARTIFACT_NAME}" \
            -C "$(dirname "$LIB_FILE")" \
            "$(basename "$LIB_FILE")" \
            "$(basename "$GHOSTTY_LIB")"

          echo "Packaged: ${ARTIFACT_NAME}"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Generate checksums
        run: |
          mix local.hex --force
          mix deps.get
          mix zigler_precompiled.download \
            --module Ghostty.Terminal.Nif \
            --base-url "https://github.com/dannote/ghostty_ex/releases/download/${GITHUB_REF#refs/tags/}" \
            --version "${GITHUB_REF#refs/tags/v}"

      - name: Commit checksum file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Ghostty.Terminal.Nif.exs
          git commit -m "Update precompiled NIF checksums for ${GITHUB_REF#refs/tags/}" || true
          git push origin HEAD:master
