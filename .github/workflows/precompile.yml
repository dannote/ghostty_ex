name: Build precompiled NIFs

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-gnu,   os: ubuntu-latest }
          - { target: aarch64-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-macos-none, os: macos-latest }

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Build libghostty-vt
        run: |
          git clone --depth 1 https://github.com/ghostty-org/ghostty.git /tmp/ghostty-src
          cd /tmp/ghostty-src
          git fetch --depth 1 origin baad0aa6669dc576872831752be0f30debecbfd1
          git checkout baad0aa6669dc576872831752be0f30debecbfd1
          zig build -Demit-lib-vt -Doptimize=ReleaseFast

      - name: Install libghostty-vt
        run: |
          # Install to priv/ (source of truth)
          mkdir -p priv/lib priv/include
          cp /tmp/ghostty-src/zig-out/lib/libghostty-vt.* priv/lib/ 2>/dev/null || true
          cp -R /tmp/ghostty-src/zig-out/include/ghostty priv/include/

          # Install to _build priv/ (where Zigler looks)
          for env in dev test; do
            dest=_build/$env/lib/ghostty/priv
            mkdir -p $dest/lib $dest/include
            cp -R priv/lib/* $dest/lib/
            cp -R priv/include/* $dest/include/

            # Fix macOS dylib install_name
            if [ -f "$dest/lib/libghostty-vt.dylib" ]; then
              real=$(readlink -f $dest/lib/libghostty-vt.dylib 2>/dev/null || realpath $dest/lib/libghostty-vt.dylib)
              install_name_tool -id "$(cd $dest/lib && pwd)/libghostty-vt.dylib" "$real" 2>/dev/null || true
            fi
          done

          ls -la priv/lib/

      - name: Build NIF
        env:
          GHOSTTY_BUILD: "1"
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile

      - name: Package artifact
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BASENAME="Elixir.Ghostty.Terminal.Nif"
          BUILD_PRIV=_build/dev/lib/ghostty/priv/lib

          LIB_FILE=$(find $BUILD_PRIV -name "*${BASENAME}.*" \
            \( -name "*.so" -o -name "*.dylib" \) \
            -not -name "*.[0-9]*" | sort | head -1)

          if [ -z "$LIB_FILE" ]; then
            echo "ERROR: Could not find built NIF library"
            find _build -name "*${BASENAME}*" -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "Found NIF: ${LIB_FILE}"

          mkdir -p artifacts
          ARTIFACT_NAME="${BASENAME}-v${VERSION}-${{ matrix.target }}.so.tar.gz"

          tar czf "artifacts/${ARTIFACT_NAME}" \
            -C "$(dirname "$LIB_FILE")" \
            "$(basename "$LIB_FILE")"

          echo "Packaged: ${ARTIFACT_NAME}"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Generate checksums
        run: |
          mix local.hex --force
          mix deps.get
          mix zigler_precompiled.download \
            --module Ghostty.Terminal.Nif \
            --base-url "https://github.com/dannote/ghostty_ex/releases/download/${GITHUB_REF#refs/tags/}" \
            --version "${GITHUB_REF#refs/tags/v}"

      - name: Commit checksum file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Ghostty.Terminal.Nif.exs
          git commit -m "Update precompiled NIF checksums for ${GITHUB_REF#refs/tags/}" || true
          git push origin HEAD:master
