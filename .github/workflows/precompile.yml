name: Build precompiled NIFs

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-gnu,   os: ubuntu-latest }
          - { target: aarch64-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-macos-none, os: macos-latest }

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Build libghostty-vt
        run: |
          git clone --depth 1 https://github.com/ghostty-org/ghostty.git /tmp/ghostty-src
          cd /tmp/ghostty-src
          git fetch --depth 1 origin baad0aa6669dc576872831752be0f30debecbfd1
          git checkout baad0aa6669dc576872831752be0f30debecbfd1
          zig build -Demit-lib-vt -Doptimize=ReleaseFast

      - name: Install libghostty-vt
        run: |
          # Install to priv/ (source of truth)
          mkdir -p priv/lib priv/include
          cp /tmp/ghostty-src/zig-out/lib/libghostty-vt.* priv/lib/ 2>/dev/null || true
          cp -R /tmp/ghostty-src/zig-out/include/ghostty priv/include/

          # On macOS, give the dylib a relative install name before the NIF is linked.
          if [ "$(uname)" = "Darwin" ]; then
            for f in priv/lib/libghostty-vt*.dylib; do
              [ -f "$f" ] && install_name_tool -id @loader_path/libghostty-vt.dylib "$f"
            done
          fi

          # Install to _build priv/ (where Zigler looks)
          for env in dev test; do
            dest=_build/$env/lib/ghostty/priv
            mkdir -p $dest/lib $dest/include
            cp -R priv/lib/* $dest/lib/
            cp -R priv/include/* $dest/include/
          done

          ls -la priv/lib/

      - name: Build NIF
        env:
          GHOSTTY_BUILD: "1"
          DYLD_LIBRARY_PATH: _build/dev/lib/ghostty/priv/lib
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile

      - name: Fix Linux packaged rpaths
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

          BUILD_PRIV=_build/dev/lib/ghostty/priv/lib
          TERMINAL_NIF=$BUILD_PRIV/Elixir.Ghostty.Terminal.Nif.so
          PTY_NIF=$BUILD_PRIV/Elixir.Ghostty.PTY.Nif.so

          patchelf --set-rpath '$ORIGIN' "$TERMINAL_NIF"
          patchelf --set-rpath '$ORIGIN' "$PTY_NIF"

          readelf -d "$TERMINAL_NIF" | grep -E 'RUNPATH|RPATH' | grep '\$ORIGIN'
          readelf -d "$PTY_NIF" | grep -E 'RUNPATH|RPATH' | grep '\$ORIGIN'

      - name: Fix macOS packaged install names
        if: runner.os == 'macOS'
        run: |
          BUILD_PRIV=_build/dev/lib/ghostty/priv/lib
          TERMINAL_NIF=$BUILD_PRIV/Elixir.Ghostty.Terminal.Nif.so
          VT_DYLIB=$BUILD_PRIV/libghostty-vt.dylib

          for vt in $BUILD_PRIV/libghostty-vt*.dylib; do
            [ -f "$vt" ] && install_name_tool -id @loader_path/libghostty-vt.dylib "$vt"
          done

          current_dep=$(otool -L "$TERMINAL_NIF" | awk '/libghostty-vt\.dylib/ {print $1; exit}')
          install_name_tool -change "$current_dep" @loader_path/libghostty-vt.dylib "$TERMINAL_NIF"

          otool -L "$TERMINAL_NIF" | grep '@loader_path/libghostty-vt.dylib'
          otool -D "$VT_DYLIB" | grep '@loader_path/libghostty-vt.dylib'

      - name: Package artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_PRIV=_build/dev/lib/ghostty/priv/lib
          mkdir -p artifacts

          package_nif() {
            local basename="$1"
            local files="$2"
            local lib_file

            lib_file=$(find "$BUILD_PRIV" -name "*${basename}.*" \
              \( -name "*.so" -o -name "*.dylib" \) \
              -not -name "*.[0-9]*" | sort | head -1)

            if [ -z "$lib_file" ]; then
              echo "ERROR: Could not find built NIF library for ${basename}"
              find _build -name "*${basename}*" -type f 2>/dev/null | head -20
              exit 1
            fi

            echo "Found NIF: ${lib_file}"
            echo "Packaging: ${files}"

            local artifact_name="${basename}-v${VERSION}-${{ matrix.target }}.so.tar.gz"
            tar czf "artifacts/${artifact_name}" \
              -C "$(dirname "$lib_file")" \
              ${files}

            echo "Packaged: ${artifact_name}"
          }

          terminal_files="Elixir.Ghostty.Terminal.Nif.so"
          for vt in $BUILD_PRIV/libghostty-vt.*; do
            [ -f "$vt" ] && terminal_files="$terminal_files $(basename "$vt")"
          done

          package_nif "Elixir.Ghostty.Terminal.Nif" "$terminal_files"
          package_nif "Elixir.Ghostty.PTY.Nif" "Elixir.Ghostty.PTY.Nif.so"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Generate checksums
        run: |
          mix local.hex --force
          mix deps.get

          echo '[]' > checksum-Ghostty.Terminal.Nif.exs
          echo '[]' > checksum-Ghostty.PTY.Nif.exs

          mix zigler_precompiled.download Ghostty.Terminal.Nif --all --ignore-unavailable
          mix zigler_precompiled.download Ghostty.PTY.Nif --all --ignore-unavailable

      - name: Commit checksum file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Ghostty.Terminal.Nif.exs checksum-Ghostty.PTY.Nif.exs
          git commit -m "Update precompiled NIF checksums for ${GITHUB_REF#refs/tags/}" || true
          git push origin HEAD:master
